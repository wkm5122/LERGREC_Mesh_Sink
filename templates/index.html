<div class="card config-card">
                    <h2>Controls & Config</h2>
                    
                    <div class="config-group">
                        <label>Suspend Duration (s)</label>
                        <div class="input-row">
                            <input type="number" id="suspend-duration" value="60">
                            <button id="btn-set-suspend">Set</button>
                        </div>
                    </div>

                    <div class="config-group">
                        <label>Publish TX Power (dBm)</label>
                        <div class="input-row">
                            <select id="tx-power">
                                <option value="0">0</option>
                                <option value="-4">-4</option>
                                <option value="-8">-8</option>
                                <option value="-20">-20</option>
                            </select>
                            <button id="btn-set-tx">Set</button>
                        </div>
                    </div>

                    <div class="config-group">
                        <label>Wake Duration (s)</label>
                        <input type="number" id="wake-duration" value="30">
                    </div>

                    <div class="config-group">
                        <label>Firmware ON Delay (s)</label>
                        <input type="number" id="firmware-delay" value="20">
                    </div>

                    <button id="btn-suspend-now" class="full-width warning-btn">Suspend Mesh Now</button>
                    
                    <div class="toggle-group" style="margin-top: 15px; margin-bottom: 15px;">
                        <label class="switch">
                            <input type="checkbox" id="toggle-auto-cycle">
                            <span class="slider round"></span>
                        </label>
                        <span>Enable Auto Cycle</span>
                    </div>

                    <button id="btn-clear-db" class="full-width action-btn" style="background: #e74c3c; border: 1px solid #c0392b;">Clear Database Data</button>
                </div>
